name: Order Cleanup

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger order cleanup
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          ORDER_CLEANUP_SECRET: ${{ secrets.ORDER_CLEANUP_SECRET }}
        run: |
          SITE_URL_CLEAN="$(printf '%s' "$SITE_URL" | tr -d '\r\n')"
          ORDER_CLEANUP_SECRET_CLEAN="$(printf '%s' "$ORDER_CLEANUP_SECRET" | tr -d '\r\n')"

          if [ -z "$SITE_URL_CLEAN" ]; then
            echo "SITE_URL secret is missing"
            exit 1
          fi

          if [ -z "$ORDER_CLEANUP_SECRET_CLEAN" ]; then
            echo "ORDER_CLEANUP_SECRET secret is missing"
            exit 1
          fi

          echo "Triggering cleanup at: ${SITE_URL_CLEAN%/}/api/cron/orders/cleanup"

          curl --fail --show-error --silent \
            -X POST "${SITE_URL_CLEAN%/}/api/cron/orders/cleanup" \
            -H "x-order-cleanup-secret: ${ORDER_CLEANUP_SECRET_CLEAN}" \
            -H "Content-Type: application/json"

name: Olist Sync

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Olist sync
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          OLIST_SYNC_SECRET: ${{ secrets.OLIST_SYNC_SECRET }}
        run: |
          SITE_URL_CLEAN="$(printf '%s' "$SITE_URL" | tr -d '\r\n')"
          OLIST_SYNC_SECRET_CLEAN="$(printf '%s' "$OLIST_SYNC_SECRET" | tr -d '\r\n')"

          if [ -z "$SITE_URL_CLEAN" ]; then
            echo "SITE_URL secret is missing"
            exit 1
          fi

          if [ -z "$OLIST_SYNC_SECRET_CLEAN" ]; then
            echo "OLIST_SYNC_SECRET secret is missing"
            exit 1
          fi

          echo "Triggering sync at: ${SITE_URL_CLEAN%/}/api/cron/olist/sync"

          curl --fail --show-error --silent \
            -X POST "${SITE_URL_CLEAN%/}/api/cron/olist/sync" \
            -H "x-olist-sync-secret: ${OLIST_SYNC_SECRET_CLEAN}" \
            -H "Content-Type: application/json"

name: Olist Sync

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Olist sync
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          OLIST_SYNC_SECRET: ${{ secrets.OLIST_SYNC_SECRET }}
        run: |
          if [ -z "$SITE_URL" ]; then
            echo "SITE_URL secret is missing"
            exit 1
          fi

          if [ -z "$OLIST_SYNC_SECRET" ]; then
            echo "OLIST_SYNC_SECRET secret is missing"
            exit 1
          fi

          curl --fail --show-error --silent \
            -X POST "${SITE_URL%/}/api/cron/olist/sync" \
            -H "x-olist-sync-secret: ${OLIST_SYNC_SECRET}" \
            -H "Content-Type: application/json"
